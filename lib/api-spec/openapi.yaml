openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: NurturetheSpectrum.com API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: listings
    description: Directory listing operations
  - name: contact
    description: Contact form
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /listings:
    get:
      operationId: getListings
      tags: [listings]
      summary: Get published listings with filters
      parameters:
        - name: county
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: specializations
          in: query
          schema:
            type: string
        - name: certifications
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 12
      responses:
        "200":
          description: List of published listings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"

  /listings/featured:
    get:
      operationId: getFeaturedListings
      tags: [listings]
      summary: Get featured listings for homepage
      responses:
        "200":
          description: Featured listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Listing"

  /listings/stats:
    get:
      operationId: getListingStats
      tags: [listings]
      summary: Get listing stats (totals by county, type, tier)
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingStats"

  /listings/{slug}:
    get:
      operationId: getListingBySlug
      tags: [listings]
      summary: Get a single listing by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Listing detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /listings/submit:
    post:
      operationId: submitListing
      tags: [listings]
      summary: Submit a new listing for review
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitListingBody"
      responses:
        "201":
          description: Submission received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubmitListingResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactBody"
      responses:
        "200":
          description: Message received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/login:
    post:
      operationId: adminLogin
      tags: [admin]
      summary: Admin login with password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminLoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminLoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/logout:
    post:
      operationId: adminLogout
      tags: [admin]
      summary: Admin logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/me:
    get:
      operationId: adminGetMe
      tags: [admin]
      summary: Check admin session
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/listings:
    get:
      operationId: adminGetListings
      tags: [admin]
      summary: Get all listings (admin)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: All listings for admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListingsResponse"
    post:
      operationId: adminCreateListing
      tags: [admin]
      summary: Create a new listing (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminListingBody"
      responses:
        "201":
          description: Listing created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/listings/{id}:
    patch:
      operationId: adminUpdateListing
      tags: [admin]
      summary: Update a listing (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminListingBody"
      responses:
        "200":
          description: Listing updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: adminDeleteListing
      tags: [admin]
      summary: Delete a listing (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/listings/{id}/approve:
    post:
      operationId: adminApproveListing
      tags: [admin]
      summary: Approve a pending listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Listing approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Listing"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/listings/export:
    get:
      operationId: adminExportListings
      tags: [admin]
      summary: Export all listings as CSV
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string

  /admin/dashboard:
    get:
      operationId: adminGetDashboard
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Listing:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        type:
          type: string
        city:
          type: string
        county:
          type: string
        specializations:
          type: array
          items:
            type: string
        certifications:
          type: array
          items:
            type: string
        website:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        hourlyRate:
          type: ["string", "null"]
        yearsExperience:
          type: ["integer", "null"]
        description:
          type: string
        logoUrl:
          type: ["string", "null"]
        tier:
          type: string
        status:
          type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - slug
        - type
        - city
        - county
        - specializations
        - certifications
        - description
        - tier
        - status
        - createdAt
        - updatedAt

    ListingsResponse:
      type: object
      properties:
        listings:
          type: array
          items:
            $ref: "#/components/schemas/Listing"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - listings
        - total
        - page
        - totalPages

    ListingStats:
      type: object
      properties:
        byCounty:
          type: array
          items:
            $ref: "#/components/schemas/CountStat"
        byType:
          type: array
          items:
            $ref: "#/components/schemas/CountStat"
        byTier:
          type: array
          items:
            $ref: "#/components/schemas/CountStat"
        total:
          type: integer
      required:
        - byCounty
        - byType
        - byTier
        - total

    CountStat:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count

    SubmitListingBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        type:
          type: string
          enum: [Agency, Individual, Platform]
        city:
          type: string
          minLength: 1
          maxLength: 100
        county:
          type: string
          enum: [Philadelphia, "Delaware County", "Bucks County", "Chester County"]
        specializations:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 100
        certifications:
          type: array
          maxItems: 20
          items:
            type: string
            maxLength: 100
        website:
          type: string
          format: uri
          pattern: '^https?://'
          maxLength: 500
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 30
        hourlyRate:
          type: string
          maxLength: 50
        yearsExperience:
          type: ["integer", "null"]
          minimum: 0
          maximum: 100
        description:
          type: string
          minLength: 1
          maxLength: 2000
        logoUrl:
          type: string
          format: uri
          pattern: '^https?://'
          maxLength: 500
      required:
        - name
        - type
        - city
        - county
        - description
        - email

    SubmitListingResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    AdminListingBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
        city:
          type: string
        county:
          type: string
        specializations:
          type: array
          items:
            type: string
        certifications:
          type: array
          items:
            type: string
        website:
          type: string
        email:
          type: string
        phone:
          type: string
        hourlyRate:
          type: string
        yearsExperience:
          type: ["integer", "null"]
        description:
          type: string
        logoUrl:
          type: string
        tier:
          type: string
        status:
          type: string

    ContactBody:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        email:
          type: string
          format: email
          maxLength: 254
        message:
          type: string
          minLength: 1
          maxLength: 5000
      required:
        - name
        - email
        - message

    AdminLoginBody:
      type: object
      properties:
        password:
          type: string
      required:
        - password

    AdminLoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    AdminMeResponse:
      type: object
      properties:
        authenticated:
          type: boolean
      required:
        - authenticated

    DashboardStats:
      type: object
      properties:
        totalListings:
          type: integer
        pendingCount:
          type: integer
        publishedCount:
          type: integer
        inactiveCount:
          type: integer
        freeCount:
          type: integer
        featuredCount:
          type: integer
        verifiedCount:
          type: integer
      required:
        - totalListings
        - pendingCount
        - publishedCount
        - inactiveCount
        - freeCount
        - featuredCount
        - verifiedCount

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
