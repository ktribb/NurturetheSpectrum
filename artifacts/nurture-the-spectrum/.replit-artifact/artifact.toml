kind = "web"
previewPath = "/"
title = "NurturetheSpectrum.com"
version = "1.0.0"
id = "artifacts/nurture-the-spectrum"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22041

[services.development]
run = "pnpm --filter @workspace/nurture-the-spectrum run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nurture-the-spectrum", "run", "build" ]
publicDir = "artifacts/nurture-the-spectrum/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22041"
BASE_PATH = "/"
